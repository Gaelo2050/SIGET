<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGET - Revisados Docente</title>
    <link rel="stylesheet" th:href="@{/css/stylesDocenteConfirmado.css}" />
    <link rel="icon" type="image/png" th:href="@{/img/iv2.png}" />
</head>
<body>

<!-- ENCABEZADO -->
<header class="encabezado">
    <div class="logo">
        <img th:src="@{/img/logo.png}" alt="Logo SIGET" />
    </div>

    <!-- MENÚ CON DETAILS / SUMMARY -->
    <nav class="menu">

        <!-- NOTIFICACIONES -->
        <details class="menu-item">
            <summary>NOTIFICACIONES ⬇</summary>
            <div class="menu-panel">
                <p>No hay notificaciones nuevas.</p>
            </div>
        </details>

        <!-- QUEJAS -->
        <details class="menu-item">
            <summary>QUEJAS ⬇</summary>
            <div class="menu-panel">
                <a th:href="@{/Docente/Quejas}">Con SIGET</a>
                <br>
                <a th:href="@{/Docente/QuejasAmbarDocente}">Con AMBAR</a>
            </div>
        </details>

        <!-- PERFIL -->
        <details class="menu-item">
            <summary>PERFIL ⬇</summary>
            <div class="menu-panel">
                <p th:text="${usuario.nombrecompleto}">Nombre usuario</p>
                <p th:text="${usuario.tipo}">Tipo usuario</p>
                <a th:href="@{/login/logout}" class="btn-cerrar-sesion">Cerrar Sesión</a>
            </div>
        </details>

    </nav>
</header>

<div class="cambio">
    <a class="vista" th:href="@{/Docente/Solicitar}">SOLICITAR</a>
    <a class="vista activo" th:href="@{/Docente/Confirmado}">REVISADOS</a>
</div>

<div class="tabla">
    <table>
        <thead>
        <tr>
            <th>Documento</th>
            <th>Área</th>
            <th>Estatus</th>
            <th>Acción</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${revisados}">
            <td th:text="${r.documentoNombre}">Constancia de adscripción</td>
            <td th:text="${r.areaDestino}">RH</td>
            <td th:text="${r.estado}">APROBADO</td>
            <td>
                <a th:if="${r.puedeDescargar}"
                   th:href="@{'/Rh/Documento/Pdf/' + ${r.documentoEmitidoId}}"
                   class="btn-pdf">
                    Descargar PDF
                </a>
                <span th:if="${!r.puedeDescargar}">
                    Sin PDF
                </span>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
